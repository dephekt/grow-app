name: Build and Publish grow-app Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'src/**'
      - 'static/**'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - '.forgejo/workflows/build.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'src/**'
      - 'static/**'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - '.forgejo/workflows/build.yaml'

jobs:
  build:
    runs-on: stackdrift
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Docker CLI
        run: |
          set -e
          if ! command -v docker > /dev/null 2>&1; then
            apt-get update
            apt-get install -y ca-certificates curl
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
            chmod a+r /etc/apt/keyrings/docker.asc
            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian \
              $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
              tee /etc/apt/sources.list.d/docker.list > /dev/null
            apt-get update
            apt-get install -y docker-ce-cli
          fi
          docker --version

      - name: Extract Upstream Version
        id: upstream
        run: |
          set -e
          upstream_image="docker.io/node"
          upstream_name="node"
          line="$(grep "FROM ${upstream_image}" Dockerfile | head -n 1)"

          if [ -z "$line" ]; then
            echo "::error::Could not find upstream image '${upstream_image}' in Dockerfile"
            exit 1
          fi

          full_image="$(echo "$line" | awk '{print $2}')"
          version="$(echo "$full_image" | awk -F: '{print $NF}')"

          echo "UPSTREAM_NAME=$upstream_name" >> "$GITHUB_OUTPUT"
          echo "UPSTREAM_VERSION=$version" >> "$GITHUB_OUTPUT"
          echo "Found upstream: $upstream_name version $version"

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: codeberg.org/stackdrift/grow-app
          tags: |
            type=semver,pattern={{version}},suffix=-${{ steps.upstream.outputs.UPSTREAM_NAME }}${{ steps.upstream.outputs.UPSTREAM_VERSION }}
            type=edge,suffix=-${{ steps.upstream.outputs.UPSTREAM_NAME }}${{ steps.upstream.outputs.UPSTREAM_VERSION }}
            type=ref,event=branch,enable=${{ github.ref_name != 'main' }},suffix=-${{ steps.upstream.outputs.UPSTREAM_NAME }}${{ steps.upstream.outputs.UPSTREAM_VERSION }}
            type=sha
            type=ref,event=pr

      - name: Login to Codeberg Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: codeberg.org
          username: stackdrift
          password: ${{ secrets.REGISTRY_DEPLOY_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
