name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'

jobs:
  check:
    name: Typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.5.3 --activate
      - name: Resolve pnpm store
        id: pnpm
        run: echo "dir=$(pnpm store path)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm check
      - name: Unit tests
        run: pnpm test

  e2e:
    name: Playwright e2e (non-blocking)
    runs-on: ubuntu-latest
    # Non-blocking: the suite has known pre-existing failures, so a red run here
    # must not fail the workflow or block merges. Results still surface via the
    # GitHub annotations and the uploaded HTML report.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.5.3 --activate
      - name: Resolve pnpm store
        id: pnpm
        run: echo "dir=$(pnpm store path)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run e2e
        run: pnpm exec playwright test --reporter=github,html
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
